name: CI

on:
  push:
    branches: [ main ]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build, static checks & offscreen golden verifier
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages (API 29)
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-29" "build-tools;29.0.3"

      # Runs the documented outcome checks: clean build, Android Lint,
      # unit/static scene/format/config checks, the offscreen golden verifier,
      # APK manifest/no-native-lib inspection, and the public-path hygiene scan.
      - name: Run outcome verifier
        run: bash scripts/verify-outcome.sh

      - name: Upload golden diagnostics (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: golden-output
          path: app/build/golden-output/
          if-no-files-found: ignore

      - name: Upload unit/lint reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            app/build/reports/
            app/build/test-results/
          if-no-files-found: ignore

      - name: Upload release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: tx10-clock-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
